<!DOCTYPE html>
<html>
 <head>
  <title>Student form</title>
 </head>
 
 <body>
  <center>
   <h1>School Addmission form</h1>
   <form>
    <table border="1" cellpadding="5" cellspacing="10">
	 <caption><b>Addmission Form</b></caption>
	 <thead>
	  <th>Type</th>
	  <th>Input</th>
	 </thead>
	 
	 <tbody>
	  <tr>
	   <th>Name</th>
	   <td><input type="text" placeholder="Enter your Name"></td>
	  </tr>
	  
	  <tr>
	   <th>Email</th>
	   <td><input type="email" placeholder="Example@gmail.com"></td>
	  </tr>
	  
	  <tr>
	   <th>Password</th>
	   <td><input type="Password" placeholder="********"></td>
	  </tr>
	  
	  <tr>
	   <th>Phone Number</th>
	   <td><input type="number" placeholder="+** ***** ****"></td>
	  </tr>
	  
	  <tr>
	   <th>color</th>
	   <td><input Type="color" placeholder="color picker"></td>
	  </tr>
	  
	  <tr>
	   <th>Range</th>
	   <td><input Type="range" min="1" max="10"></td>
	  </tr>
	  
	  <tr>
	   <th>File</th>
	   <td><input type="file"></td>
	  </tr>
	  
	  <tr>
	   <th>Date</th>
	   <td><input type="date"></td>
	  </tr>
	  
	  <tr>
	   <th>Gender</th>
	   <td><lable>Male<input type="radio" name="gender"><lable>Female<input type="radio" name="gender"><lable>other<input type="radio" name="gender"></td>
	  </tr>
	  
	  <tr>
	   <th>Cast</th>
	   <td><label>Genrel<input type="checkbox"><label>obc<input type="checkbox"><label>st<input type="checkbox"><label>sc<input type="checkbox"><label>other<input type="checkbox"></td>
	  </tr>
	  
	  <tr>
	   <th>Address</th>
	   <td><textarea rows="4" cols="35" placeholder="Write your Address"></textarea></td>
	  </tr>
	  
	  <tr>
	   <th>select</th>
	   <td><select><option value="html">html</option><option value="CSS">CSS</option><option value="JS">JS</option></td>
	  </tr>
	  
	  <tr>
	   <td><button type="submit">submit</button></td>
	   <td><button type="Reset">Reset</button></td>
	  </tr>

	  
	 </tbody>
	</table>
   </form>
  </center>
 </body>
</html>
